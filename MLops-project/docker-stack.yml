version: "3.8"

services:
  imgclass:
    image: yashgupta567/projectv2:latest
    ports:
      - "8501:8501"
    networks:
      - app-network
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.50"
          memory: 512M

networks:
  app-network:
    driver: overlay